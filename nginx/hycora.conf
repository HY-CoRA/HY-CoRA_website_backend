server {
    listen 80;
    server_name api.hycora.co.kr;

    # HTTP → HTTPS 리디렉션
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.hycora.co.kr;

    # SSL (certbot이 자동으로 채워줌)
    ssl_certificate /etc/letsencrypt/live/api.hycora.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hycora.co.kr/privkey.pem;

    # 업로드 이미지 정적 서빙


    location /uploads/ {
        alias /var/www/hycora-uploads/;


        location ~* \.(php|sh|py|pl|cgi)$ {
            deny all;
        }

        autoindex off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 프록시
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
}
