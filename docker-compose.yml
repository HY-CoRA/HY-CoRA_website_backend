services:
  mysql:
    image: mysql:8.0
    container_name: hycora-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: hycora
      MYSQL_USER: hycora
      MYSQL_PASSWORD: hycora1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hycora-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hycora
      SPRING_DATASOURCE_USERNAME: hycora
      SPRING_DATASOURCE_PASSWORD: hycora1234
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hycora.co.kr}
      JWT_SECRET: ${JWT_SECRET:-changeme}
    ports:
      - "8080:8080"

volumes:
  mysql-data:
