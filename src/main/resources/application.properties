# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hycora
spring.datasource.username=hycora
spring.datasource.password=hycora1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT (운영 환경에서는 .env 또는 환경변수로 교체)
jwt.secret=${JWT_SECRET:hycora-secret-key-must-be-at-least-32-chars!!}
jwt.expiration=86400000

# CORS
cors.origin=${CORS_ORIGIN:https://hycora.co.kr}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.rp-id=${APP_RP_ID:localhost}
app.rp-name=${APP_RP_NAME:HY-CoRA}

# Swagger
springdoc.swagger-ui.enabled=true
